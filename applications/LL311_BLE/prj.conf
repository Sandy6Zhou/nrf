# Enable the UART driver
CONFIG_UART_ASYNC_API=y
CONFIG_NRFX_UARTE=y
CONFIG_SERIAL=y

# Enable the GPIO driver
CONFIG_GPIO=y

# Enable I2C driver
CONFIG_I2C=y

# Enable PWM driver
CONFIG_PWM=y

# Make sure printk is printing to the RTT console
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=n
CONFIG_RTT_CONSOLE=y

# Enable Shell
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_RTT=y
CONFIG_SHELL_BACKEND_SERIAL=n
CONFIG_SHELL_VT100_COMMANDS=y
CONFIG_SHELL_HISTORY=y

# Increase RTT buffer size to prevent message drops
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=4096
CONFIG_LOG_BUFFER_SIZE=4096

# Heap and stacks
CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# Bluetooth RX workqueue stack size (default 1200 is insufficient for BLE log, increased to 2048)
CONFIG_BT_RX_STACK_SIZE=2048

# Enable Bluetooth
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="LL311"
CONFIG_BT_DEVICE_APPEARANCE=512
CONFIG_BT_MAX_CONN=2
CONFIG_BT_MAX_PAIRED=1

# Enable extended advertising for multiple advertising sets
CONFIG_BT_EXT_ADV=y
CONFIG_BT_EXT_ADV_MAX_ADV_SET=4

# Enable the Device Information Service
# CONFIG_BT_DIS=y
# CONFIG_BT_DIS_MANUF_NAME=y
# CONFIG_BT_DIS_MANUF_NAME_STR="Nordic Semiconductor ASA"
# CONFIG_BT_DIS_PNP=y
# CONFIG_BT_DIS_PNP_VID_SRC=2
# CONFIG_BT_DIS_PNP_VID=0x1915
# CONFIG_BT_DIS_PNP_PID=0xEEF1
# CONFIG_BT_DIS_PNP_VER=0x0100

# Disable NUS service
CONFIG_BT_NUS=n
# CONFIG_BT_NUS_THREAD_STACK_SIZE is no longer needed

# Enable bonding
CONFIG_BT_SETTINGS=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_STREAM_FLASH=y
CONFIG_PARTITION_MANAGER_ENABLED=y

# Enable DK LED and Buttons library
CONFIG_DK_LIBRARY=n

# Disable SPI NOR Flash
CONFIG_SPI_NOR=n
CONFIG_NORDIC_QSPI_NOR=n

# Enable Power Management
CONFIG_PM=y
CONFIG_PM_DEVICE=y
CONFIG_PM_DEVICE_RUNTIME=y

# Config logger
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_USE_SEGGER_RTT=y
CONFIG_LOG_BACKEND_RTT=n
CONFIG_LOG_BACKEND_UART=n
CONFIG_LOG_PRINTK=n
CONFIG_LOG_CUSTOM_FORMAT_SUPPORT=y
CONFIG_LOG_OUTPUT_FORMAT_CUSTOM_TIMESTAMP=y
CONFIG_LOG_BACKEND_FORMAT_TIMESTAMP=y


# Enable assertions
CONFIG_ASSERT=y

# Enable power management
CONFIG_PM=y
CONFIG_PM_DEVICE=y

# Enable Watchdog
# CONFIG_WATCHDOG=y

# Enable reboot
CONFIG_REBOOT=y

# Enable ADC
CONFIG_ADC=y
CONFIG_ADC_NRFX_SAADC=y

# ST MEMSC HAL
CONFIG_USE_STDC_LSM6DSV16X=y

# Enable poweroff
CONFIG_POWEROFF=y

# nRF Security + PSA Crypto
CONFIG_NRF_SECURITY=y

# AES ECB
CONFIG_PSA_WANT_KEY_TYPE_AES=y
CONFIG_PSA_WANT_ALG_ECB_NO_PADDING=y

# Enable MCUManager and BT OTA DFU
CONFIG_NCS_SAMPLE_MCUMGR_BT_OTA_DFU=y

# Enable Bluetooth OTA DFU support, no authentication required
CONFIG_MCUMGR_TRANSPORT_BT_PERM_RW=y

# MCUmgr notification hooks for OTA status monitoring
CONFIG_MCUMGR_MGMT_NOTIFICATION_HOOKS=y
CONFIG_MCUMGR_SMP_COMMAND_STATUS_HOOKS=y
CONFIG_MCUMGR_GRP_IMG_UPLOAD_CHECK_HOOK=y

# Enable Bluetooth SMP (Security Manager Protocol)
CONFIG_BT_SMP=y

# Enable Secure Connections pairing (for Passkey Entry)
CONFIG_BT_SMP_SC_PAIR_ONLY=n

# Enable larger ACL buffers for DFU (MTU 498 + 4 bytes L2CAP header)
# Supports dual-PDU mode: max data length = 251 * 2 = 502
CONFIG_BT_L2CAP_TX_MTU=498
CONFIG_BT_BUF_ACL_RX_SIZE=502
CONFIG_BT_BUF_ACL_TX_SIZE=502
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251
